{% extends "_app_frame.html" %}

{% block page_styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/landing.css', v=asset_version) }}">
{% endblock %}

{% block body_class %} site-app-body-headerless site-app-body-home{% endblock %}

{% block content %}
<section class="landing-shell">
  <div class="landing-card">
    <div class="landing-card-copy">
      <span class="landing-card-kicker">Personal tools</span>
      <h1 class="landing-card-title">{{ site_brand_name }}</h1>
    </div>
    <div class="landing-theme-toggle" data-theme-slider>
      <div class="landing-theme-track" data-theme-track role="slider" aria-label="Theme mode" aria-valuemin="0" aria-valuemax="2" aria-valuenow="1" tabindex="0">
        <span class="landing-theme-label landing-theme-label-light" data-theme-label-theme="light">light</span>
        <span class="landing-theme-label landing-theme-label-system" data-theme-label-theme="system">system</span>
        <span class="landing-theme-label landing-theme-label-dark" data-theme-label-theme="dark">dark</span>
        <span class="landing-theme-thumb" data-theme-thumb aria-hidden="true"></span>
      </div>
    </div>
  </div>
</section>
{% endblock %}
