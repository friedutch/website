<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="{{ url_for('static', filename='js/early-theme.js') }}"></script>
<title>Smart Lock — Add Session 📲</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/smartlock/add_session.css') }}">
</head>
<body>
<button class="theme-toggle" data-theme-toggle id="theme-btn">🔄</button>
<div class="wrap">
  <div class="hero">
    <div class="app-icon">📲</div>
    <h1>Add a session!</h1>
    <p>Open the link on your other device</p>
  </div>
  <div class="number-box">
    <div class="number-label">✨ Your captcha code</div>
    <div class="number-display">{{ captcha_code }}</div>
    <div class="number-hint">Select this captcha on the other device 👆</div>
  </div>
  <div class="url-card">
    <div class="url-label">🔗 Link for other device</div>
    <div class="url-box">{{ join_url }}</div>
    <button class="sm-btn sm-cyan copy-join-url-btn" type="button" data-copy-text="{{ join_url }}">📋 Copy link</button>
  </div>
  <p class="cd-note">Link expires in <span id="exp-timer" data-remaining="300">5:00</span></p>
  <div class="back-link"><a href="/smartlock/admin">← Back to panel</a></div>
</div>
{% include "_debug_footer.html" %}

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/smartlock/add_session.js') }}"></script>

</body>
</html>
