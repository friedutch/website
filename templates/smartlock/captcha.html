<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="{{ url_for('static', filename='js/early-theme.js', v=asset_version) }}"></script>
<title>{{ page_name or 'Smart Lock — Solve captcha' }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css', v=asset_version) }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/smartlock/captcha.css', v=asset_version) }}">
</head>
<body>
<div class="top-bar-unified">
  <div class="top-bar-main">
    <div class="app-brand">
      <div class="brand-icon">🔐</div>
      <div>
        <div class="brand-name">Smart Lock</div>
        <div class="brand-sub">Friedutch Plus</div>
      </div>
    </div>
    <div class="top-right">
      <a class="top-icon-btn" href="/">🏠</a>
      <form method="POST" action="/smartlock/logout" class="top-icon-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="top-icon-btn" type="submit" data-confirm="Log out">👋</button>
      </form>
      <button class="top-icon-btn" data-theme-toggle id="theme-btn" type="button">🔄</button>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="hero">
    <div class="app-icon">🎯</div>
    <h1>Solve the captcha!</h1>
    <p>Which captcha code is showing on your screen? 👀</p>
  </div>
  <div class="num-grid">
  {% for opt in options %}
  <form class="contents-form" method="POST" action="{{ '/smartlock/verify-email-captcha' if mode == 'email_change' else '/smartlock/join-captcha' if mode == 'join' else '/smartlock/verify-captcha' }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">
    <input type="hidden" name="captcha_code" value="{{ opt }}">
    <button class="num-btn" type="submit">{{ opt }}</button>
  </form>
  {% endfor %}
  </div>
  {% if error %}<p class="msg-err">{{ error }}</p>{% endif %}
</div>


<script src="{{ url_for('static', filename='js/theme.js', v=asset_version) }}"></script>

</body>
</html>
